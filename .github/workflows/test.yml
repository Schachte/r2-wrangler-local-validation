name: compat

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: typecheck
        run: npm run typecheck

      - name: run compat tests
        env:
          REMOTE: ${{ secrets.REMOTE }}
          LOCAL: ${{ secrets.LOCAL }}
          R2_S3_ENDPOINT: ${{ secrets.R2_S3_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          WRANGLER_CWD: ${{ secrets.WRANGLER_CWD }}
          VERBOSE: "1"
          NO_COLOR: ""
        run: |
          npm test 2>&1 | tee test-output.txt
          exit ${PIPESTATUS[0]}

      - name: annotate failures
        if: failure()
        run: |
          grep -E '^\s*(FAIL|[0-9]+\.) ' test-output.txt | while IFS= read -r line; do
            echo "::error::$line"
          done
